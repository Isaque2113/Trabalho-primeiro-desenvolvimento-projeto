<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Foodly</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <main>
        <h1>Cadastro</h1>
        <label for="email">Email :</label><br>
        <input type="text" placeholder="Digite seu email"><br><br>
        <label for="telefone">Telefone: </label><br>
        <input type="text" placeholder="Digite seu telefone"><br><br>
        <label for="CEP">CEP:</label><br>
        <input type="text" placeholder="Digite seu CEP"><br><br>
        <label for="Rua">Numero</label><br>
        <input type="text" placeholder="Digite o numero da sua casa"><br><br>
        <label for="password">Senha:</label><br>
        <input type="password" placeholder="Digite sua senha"><br><br>
        <button >Confirmar</button>
    </main>
</body>
</html>
